  /v1/seller/content/search:
    post:
      summary: Search content by metadata
      tags:
        - Content
      description: >
        Search for content using metadata key/value pairs. Supports searching by internal reference identifiers
        such as vimeo_id, external_url, or any custom metadata fields. All criteria must match (AND logic).


        **Required Permission:** `view` or `full`
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - metadata
              properties:
                metadata:
                  type: object
                  description: Key/value pairs to search for in content metadata
                  additionalProperties: true
                  minProperties: 1
            examples:
              searchByVimeoId:
                summary: Search by Vimeo ID
                value:
                  metadata:
                    vimeo_id: '123456789'
              searchByExternalUrl:
                summary: Search by external URL
                value:
                  metadata:
                    external_url: 'https://example.com/page'
              searchByMultipleCriteria:
                summary: Search with multiple criteria
                value:
                  metadata:
                    vimeo_id: '123456789'
                    category: 'tutorial'
              searchByCustomField:
                summary: Search by custom metadata field
                value:
                  metadata:
                    internal_ref: 'PROJ-2024-001'
      responses:
        '200':
          description: List of matching content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentResponse'
              examples:
                matching_content:
                  summary: Content matching search criteria
                  value:
                    - id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                      content_type: 'markdown'
                      title: 'Video Tutorial: Introduction'
                      teaser: 'Learn the basics in this introductory video tutorial'
                      price_cents: 500
                      visibility: 'public'
                      created_at: '2025-05-18T10:00:00Z'
                empty_results:
                  summary: No matching content found
                  value: []
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_metadata:
                  summary: Metadata parameter missing
                  value:
                    error:
                      code: 400
                      message: 'metadata is missing'
                empty_metadata:
                  summary: Empty metadata object
                  value:
                    error:
                      code: 400
                      message: 'metadata must contain at least one key/value pair'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid or missing token
                  value:
                    error:
                      code: 401
                      message: 'Invalid authentication token'

  /v1/seller/content/{id}:
    get:
      summary: Get content by ID
      tags:
        - Content
      description: >
        Retrieve a specific content item by its ID.


        **Required Permission:** `view` or `full`
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Content ID
      responses:
        '200':
          description: Content retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
              examples:
                content:
                  summary: Retrieved content
                  value:
                    id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                    content_type: 'markdown'
                    title: 'Sample Blog Post'
                    content_body: 'IyBUZXN0IFBvc3RcblxuVGhpcyBpcyBhIGRldGFpbGVkIGJsb2cgcG9zdCBhYm91dCB0ZWNobm9sb2d5IHRyZW5kcy4='
                    teaser: 'IyBUZXN0IFBvc3RcblxuVGhpcyBpcyBhIHByZXZpZXcgb2YgdGhlIGJsb2cgcG9zdC4='
                    price_cents: 500
                    visibility: 'public'
                    metadata:
                      author: 'Jane Doe'
                      publication_date: '2025-05-18T10:00:00Z'
                      reading_time: '5 min'
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid or missing token
                  value:
                    error: 'Invalid authentication token'
        '404':
          description: Content not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: Content not found
                  value:
                    error: 'requested content was not found'

    patch:
      summary: Update content item
      tags:
        - Content
      description: >
        Update an existing content item.


        **Authorization:**

        - `owner`: can update any content in the store, including reassigning
          the author via `store_user_id`.

        - `is_author: true` (non-owner): can only update their own content; `store_user_id` is ignored even if provided.

        - API key (`full` permission): can update any content and reassign authorship.


        **Assigning an author:** pass a `store_user_id` from `GET /v1/merchant/{store_id}/users`.
        Pass `null` to clear attribution.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Content ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentUpdateRequest'
      responses:
        '200':
          description: Content updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
              examples:
                updated_content:
                  summary: Successfully updated content
                  value:
                    id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                    content_type: 'markdown'
                    title: 'Updated Blog Post Title'
                    price_cents: 750
                    visibility: 'public'
                    metadata:
                      author: 'Jane Doe'
                      publication_date: '2025-05-18T10:00:00Z'
                      reading_time: '7 min'
        '400':
          description: Invalid content parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error:
                  summary: Content validation error
                  value:
                    code: 400
                    message: 'Content validation failed: Title is required, Price must be greater than 0'
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid or missing token
                  value:
                    error: 'Invalid authentication token'
        '404':
          description: Content not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: Content not found
                  value:
                    error: 'requested content was not found'

    delete:
      summary: Delete content item
      tags:
        - Content
      description: >
        Permanently delete a content item.


        **Required Permission:** `full`
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Content ID
      responses:
        '204':
          description: Content deleted
          content:
            application/json:
              examples:
                deleted:
                  summary: Content successfully deleted
                  value: {}

