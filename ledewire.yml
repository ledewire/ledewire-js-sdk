      description: >
        Currently only offers support for the following content type:
        - Markdown


        **Authorization:**

        Store manager tokens: only `owner` role and users with `is_author: true` may create content.
        Users with neither (no role, `is_author: false`) will receive a `403 Forbidden`.


        API key/secret authentication: permitted with `full` permission. The store's `owner`
        will be automatically set as the author if one exists; otherwise content is created
        without an author.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Content'
            examples:
              markdownContent:
                value:
                  content_type: markdown
                  title: 'Sample Blog Post'
                  content_body: 'IyBUZXN0IFBvc3RcblxuVGhpcyBpcyBhIGRldGFpbGVkIGJsb2cgcG9zdCBhYm91dCB0ZWNobm9sb2d5IHRyZW5kcy4='
                  price_cents: 500
                  visibility: public
                  metadata:
                    author: 'Jane Doe'
                    reading_time: '5 min'
              richMediaContent:
                value:
                  type: rich_media
                  title: 'Comprehensive Tech Guide'
                  content: 'base64_encoded_content_or_file_reference'
                  external_references:
                    - type: video
                      url: 'https://example.com/intro-video'
                      description: 'Introduction to the guide'
      responses:
        '201':
          description: Content created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
              examples:
                created_content:
                  summary: Successfully created content
                  value:
                    id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                    content_type: 'markdown'
                    title: 'Sample Blog Post'
                    content_body: 'IyBUZXN0IFBvc3RcblxuVGhpcyBpcyBhIGRldGFpbGVkIGJsb2cgcG9zdCBhYm91dCB0ZWNobm9sb2d5IHRyZW5kcy4='
                    teaser: 'IyBUZXN0IFBvc3RcblxuVGhpcyBpcyBhIHByZXZpZXcgb2YgdGhlIGJsb2cgcG9zdC4='
                    price_cents: 500
                    visibility: 'public'
                    metadata:
                      author: 'Jane Doe'
                      publication_date: '2025-05-18T10:00:00Z'
                      reading_time: '5 min'

                # type: object
                # properties:
                #   id:
                #     type: string
                #   type:
                #     type: string
                #   content_url:
