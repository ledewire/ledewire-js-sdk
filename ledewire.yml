  /v1/auth/merchant/stores:
    get:
      summary: List stores the authenticated user can manage
      description: >
        Returns all stores the authenticated user has a StoreUser record for.
        Requires a buyer or merchant JWT. The response includes `is_author` so
        clients can determine what actions the user may perform in each store.
      tags:
        - Merchant Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of manageable stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManageableStore'
              examples:
                stores:
                  summary: Stores the user manages
                  value:
                    - store_id: 'a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d'
                      store_name: 'My Store'
                      store_key: 'my-store'
                      role: 'owner'
                      is_author: true
                      logo: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/merchant/login/email:
    post:
      summary: Log in as a merchant with email and password
      description: >
        Authenticates a user and returns a store-agnostic merchant JWT.
        The token carries `role: merchant` with no embedded store context.
        Use `GET /v1/auth/merchant/stores` to discover which stores the user
        can manage, then pass the desired `store_id` as a URL parameter on
        merchant resource endpoints.
      tags:
