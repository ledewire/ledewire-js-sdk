        (platform_fee_cents, store_net_cents, author_net_cents). Owner access only.
        The buyer-facing GET /v1/purchases/:id intentionally omits the fees object.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sale detail with fee breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantSaleResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — not the store owner, or store mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sale not found or belongs to a different store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

