                  updated_at:
                    type: string
                    format: date-time
                  balance_cents:
                    type: integer
                    description: Current wallet balance if payment succeeded

  /v1/wallet/payment-webhook:
    post:
      summary: Webhook handler for wallet funding completion
      description: >
        Receives webhook notifications from payment providers for payment events.
        When a payment success event is received for a wallet funding transaction,
        the system will automatically update the transaction status and fund the user's wallet.
        Currently implemented for Stripe webhook events.
      tags:
        - Wallet
      security: [] # No authentication required for payment provider webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payment provider event object
      responses:
        '200':
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid token
                  value:
                    error: 'Invalid authentication token'
        '403':
          description: Forbidden - User lacks sufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  summary: Insufficient permissions
                  value:
                    error: 'Insufficient permissions to access this resource'
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                provider_error:
                  summary: Provider error
                  value:
                    error: 'Unable to verify transaction with provider'

