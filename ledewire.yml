  /v1/auth/password/reset-request:
    post:
      summary: Request a password reset code
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Password reset code sent (if account exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: 'If an account with this email exists, a reset code has been sent.'
        '429':
          description: Too many requests (rate limit exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rate_limit:
                  summary: Rate limit exceeded
                  value:
                    error:
                      code: 429
                      message: 'Too many reset attempts. Please try again later.'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_email:
                  summary: Invalid email format
                  value:
                    error:
                      code: 400
                      message: 'email must be a valid email address'

  /v1/auth/password/reset:
    post:
      summary: Reset password using code
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, reset_code, password]
              properties:
                email:
                  type: string
                  format: email
                reset_code:
                  type: string
                  description: 6-digit numeric code
                  example: '123456'
                password:
                  type: string
                  description: New password (min 6 chars)
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: 'Password has been successfully reset.'
        '400':
          description: Invalid request or code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_code:
                  summary: Invalid or expired code
                  value:
                    error:
                      code: 400
                      message: 'Invalid or expired reset code'
                invalid_password:
                  summary: Password too short
                  value:
                    error:
                      code: 400
                      message: 'Failed to update password: Password is too short (minimum is 6 characters)'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: User not found
                  value:
                    error:
                      code: 404
                      message: 'User not found'

