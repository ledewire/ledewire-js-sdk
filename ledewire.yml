openapi: 3.1.0
info:
  title: LedeWire API
  version: 1.1.0
  description: >
    LedeWire API for buyer/seller authentication, wallet funding, content purchases, and seller content management.

servers:
  - url: https://api.ledewire.com
    description: Production server
  - url: https://api-staging.ledewire.com
    description: Staging server
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT Bearer token obtained from authentication endpoints.


        **Seller Permission Levels:**

        - **`view` permission** - Read-only access. Obtained by authenticating with API key only (without secret).

        - **`full` permission** - Full read/write access. Obtained by authenticating with both API key and API secret.


        Use the appropriate authentication method based on your use case:

        - For read-only operations (listing, viewing, searching content), authenticate with API key only to receive `view` permission

        - For write operations (creating, updating, deleting content), authenticate with API key + secret to receive `full` permission

  schemas:
    ContentAccessInfo:
      type: object
      required: [user_id, has_purchased, has_sufficient_funds, wallet_balance_cents, next_required_action]
      properties:
        user_id:
          type: [string, null]
        has_purchased:
          type: boolean
        has_sufficient_funds:
          type: boolean
        wallet_balance_cents:
          type: integer
        next_required_action:
          type: string
          enum: [authenticate, fund_wallet, purchase, none]

    AuthenticationResponse:
      type: object
      required: [token_type, access_token, refresh_token, expires_at]
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9..VSFsm5ysjtZLheVfhv6DWwH1A9zn_WA6rnGOlPR1R3U
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
          description: When the Access Token expires

    MerchantAuthenticationResponse:
      type: object
      description: Token response for merchant authentication. Tokens are store-agnostic — no store_context is embedded.
      required: [token_type, access_token, refresh_token, expires_at]
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    JWTClaims:
      type: object
      properties:
        sub:
          type: string
          description: User or Store identifier
        role:
          type: string
          enum: [buyer, seller-view, seller-full, merchant]
        seller_claims:
          type: object
          properties:
            seller_id:
              type: string
        buyer_claims:
          type: object
          properties:
            user_id:
              type: string
            email:
              type: string
        user_claims:
          type: object
          description: Present on merchant tokens
          properties:
            id:
              type: string
            email:
              type: string
            full_name:
              type: string
        iat:
          type: integer
        exp:
          type: integer
        nbf:
          type: integer
        iss:
          type: string
        aud:
          type: string
        token_metadata:
          type: object
          properties:
            created_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            token_id:
              type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string

    AuthSignupRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string

    AuthLoginEmailRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    AuthLoginOAuthRequest:
      type: object
      properties:
        id_token:
          type: string

    MerchantEmailLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    MerchantGoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string

    AuthLoginApiKeyRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
        secret:
          type: string

    AuthTokenRefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string

    ManageableStore:
      type: object
      required: [store_id, store_name, store_key, role, is_author, logo]
      properties:
        store_id:
          type: string
        store_name:
          type: string
        store_key:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
        is_author:
          type: boolean
          description: Whether the authenticated user has author permissions for this store.
        logo:
          type: [string, 'null']

    MerchantUser:
      type: object
      required: [id, user_id, store_id, role, is_author, invited_at, accepted_at, email]
      properties:
        id:
          type: string
        user_id:
          type: [string, 'null']
        store_id:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
          description: Named role. `owner` is the only valid named role; non-owner authors have a null role.
        is_author:
          type: boolean
          description: Whether this user can create and manage their own content.
        invited_at:
          type: [string, 'null']
          format: date-time
        accepted_at:
          type: [string, 'null']
          format: date-time
        email:
          type: [string, 'null']

    MerchantInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          description: Email address of the user to invite to the store.
        is_author:
          type: boolean
          default: true
          description: Whether to grant author permissions. Defaults to `true`.

    MerchantInviteResponse:
      type: object
      required: [invitation_token, email, role, is_author, expires_at]
      properties:
        invitation_token:
          type: string
        email:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
        is_author:
          type: boolean
        expires_at:
          type: string
          format: date-time

    WalletPaymentSessionRequest:
      type: object
      required: [amount_cents]
      properties:
        amount_cents:
          type: integer
          description: Amount to fund the wallet in cents
        currency:
          type: string
          default: usd
          description: Currency code (defaults to USD)
        metadata:
          type: object
          description: Additional metadata to include with the payment session

    WalletPaymentSessionResponse:
      type: object
      required: [client_secret, session_id, public_key]
      properties:
        client_secret:
          type: string
          description: The client secret used by the payment widget to confirm the payment
        session_id:
          type: string
          description: The ID of the created payment session
        public_key:
          type: string
          description: The payment public key to be used during the payment processing

    PaymentWebhookEvent:
      type: object
      description: A payment provider webhook event object
      properties:
        id:
          type: string
          description: Unique identifier for the event
        type:
          type: string
          description: Type of event (e.g., payment_intent.succeeded, payment_intent.payment_failed)
        data:
          type: object
          description: Event data containing the object that triggered the event

    WalletBalanceResponse:
      type: object
      required: [balance_cents]
      properties:
        balance_cents:
          type: integer

    WalletTransactionItem:
      type: object
      required: [id, type, reason, amount_cents, balance_after_cents, status, reference_id, description, occurred_at]
      properties:
        id:
          type: string
          description: ID of the transaction entry (matches the source record)
        type:
          type: string
          enum: [credit, debit]
          description: Direction relative to the user's wallet
        reason:
          type: string
          enum: [wallet_funding, purchase, refund]
          description: What caused this wallet movement
        amount_cents:
          type: integer
          description: Always positive; direction expressed by `type`
        balance_after_cents:
          type: integer
          description: Running wallet balance immediately after this event
        status:
          type: string
          enum: [completed, pending, failed, cancelled]
        reference_id:
          type: string
          description: ID of the source record (Purchase or FundingTransfer)
        description:
          type: string
          description: Human-readable label suitable for display
        occurred_at:
          type: string
          format: date-time
          description: created_at of the source record

    PurchaseCreateRequest:
      type: object
      properties:
        content_id:
          type: string
        price_cents:
          type: integer

    PurchaseVerifyResponse:
      type: object
      required: [has_purchased]
      properties:
        has_purchased:
          type: boolean
        purchase_details:
          type: object
          properties:
            purchase_id:
              type: string
            purchase_date:
              type: string
              format: date-time
        checkout_readiness:
          type: object
          properties:
            is_authenticated:
              type: boolean
            has_sufficient_funds:
              type: boolean

    ContentUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          description: Content title
        content_body:
          type: string
          format: byte
          description: Full content body, base64 encoded
        teaser:
          type: string
          format: byte
          description: Content teaser, base64 encoded
        price_cents:
          type: integer
          minimum: 1
          description: Price in cents (must be greater than 0)
        visibility:
          type: string
          enum: [public, unlisted]
        metadata:
          type: object
          additionalProperties: true
        store_user_id:
          type: [string, 'null']
          description: >
            Assign or clear content authorship. Provide the `id` of a `StoreUser` from
            `GET /v1/merchant/{store_id}/users` to assign an author, or `null` to clear attribution.
            Only available to `owner` role and API key auth.
            Users with `is_author: true` (non-owner) cannot reassign their own content.

    SalesStatisticsItem:
      type: object
      required: [content_id, title, total_sales, total_revenue_cents]
      properties:
        content_id:
          type: string
        title:
          type: string
        total_sales:
          type: integer
        total_revenue_cents:
          type: integer

    BuyerStatisticsItem:
      type: object
      description: >
        Seller-scoped buyer aggregate statistics for reporting.


        Prefer `buyer_ref` over any global buyer identifier.
      required: [buyer_ref, purchases_count, total_spent_cents, first_purchase_at, last_purchase_at, buyer_status]
      properties:
        buyer_ref:
          type: string
          description: Opaque, seller-scoped identifier for a buyer (not the global user id).
        purchases_count:
          type: integer
          description: Number of completed purchases by this buyer for this seller.
        total_spent_cents:
          type: integer
          description: Total amount spent by this buyer for this seller, in cents.
        first_purchase_at:
          type: string
          format: date-time
          description: Timestamp of the buyer's first completed purchase for this seller.
        last_purchase_at:
          type: string
          format: date-time
          description: Timestamp of the buyer's most recent completed purchase for this seller.
        buyer_status:
          type: string
          description: Coarse segmentation label derived by the platform.
          enum: [new, repeat, inactive]

    AhoyEvent:
      type: object
      properties:
        name:
          type: string
          description: Name of the event being tracked
        properties:
          type: object
          description: Additional properties for the event
          additionalProperties: true
        time:
          type: string
          format: date-time
          description: When the event occurred
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the event
        visit_id:
          type: string
          format: uuid
          description: ID of the visit associated with the event

    AhoyVisit:
      type: object
      properties:
        visit_token:
          type: string
          description: Unique token for this visit
        visitor_token:
          type: string
          description: Token identifying the visitor
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the visit
        ip:
          type: string
          description: IP address of the visitor
        user_agent:
          type: string
          description: User agent string
        referrer:
          type: string
          description: Referrer URL
        referring_domain:
          type: string
          description: Domain of the referrer
        landing_page:
          type: string
          description: Landing page URL
        browser:
          type: string
          description: Browser name
        os:
          type: string
          description: Operating system
        device_type:
          type: string
          description: Type of device
        country:
          type: string
          description: Country of the visitor
        region:
          type: string
          description: Region of the visitor
        city:
          type: string
          description: City of the visitor
        latitude:
          type: number
          format: float
          description: Latitude coordinate
        longitude:
          type: number
          format: float
          description: Longitude coordinate
        utm_source:
          type: string
          description: UTM source parameter
        utm_medium:
          type: string
          description: UTM medium parameter
        utm_term:
          type: string
          description: UTM term parameter
        utm_content:
          type: string
          description: UTM content parameter
        utm_campaign:
          type: string
          description: UTM campaign parameter
        app_version:
          type: string
          description: App version (for native apps)
        os_version:
          type: string
          description: OS version (for native apps)
        platform:
          type: string
          description: Platform (for native apps)
        started_at:
          type: string
          format: date-time
          description: When the visit started

    AhoyEventRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Name of the event being tracked
        properties:
          type: object
          description: Additional properties for the event
          additionalProperties: true
        time:
          type: string
          format: date-time
          description: When the event occurred (defaults to current time)
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the event
        visit_id:
          type: string
          format: uuid
          description: ID of the visit associated with the event

    AhoyVisitRequest:
      type: object
      properties:
        visit_token:
          type: string
          description: Unique token for this visit
        visitor_token:
          type: string
          description: Token identifying the visitor
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the visit
        ip:
          type: string
          description: IP address of the visitor
        user_agent:
          type: string
          description: User agent string
        referrer:
          type: string
          description: Referrer URL
        referring_domain:
          type: string
          description: Domain of the referrer
        landing_page:
          type: string
          description: Landing page URL
        browser:
          type: string
          description: Browser name
        os:
          type: string
          description: Operating system
        device_type:
          type: string
          description: Type of device
        country:
          type: string
          description: Country of the visitor
        region:
          type: string
          description: Region of the visitor
        city:
          type: string
          description: City of the visitor
        latitude:
          type: number
          format: float
          description: Latitude coordinate
        longitude:
          type: number
          format: float
          description: Longitude coordinate
        utm_source:
          type: string
          description: UTM source parameter
        utm_medium:
          type: string
          description: UTM medium parameter
        utm_term:
          type: string
          description: UTM term parameter
        utm_content:
          type: string
          description: UTM content parameter
        utm_campaign:
          type: string
          description: UTM campaign parameter
        app_version:
          type: string
          description: App version (for native apps)
        os_version:
          type: string
          description: OS version (for native apps)
        platform:
          type: string
          description: Platform (for native apps)
        started_at:
          type: string
          format: date-time
          description: When the visit started (defaults to current time)

    Content:
      type: object
      required: [content_type, title, price_cents, content_body]
      properties:
        content_type:
          type: string
          enum:
            - markdown
          description: The type of content being uploaded
        title:
          type: string
          description: Content title
        content_body:
          type: string
          format: byte
          description: (Optional) Full article content, written in markdown and base64 encoded.
        teaser:
          type: string
          format: byte
          description: (Optional) Article teaser, written in markdown and base64 encoded.
        price_cents:
          type: integer
          description: Price for the content in cents.
        visibility:
          type: string
          enum: [public, unlisted]
          default: public
        metadata:
          type: object
          description: Flexible metadata for additional context
          additionalProperties: true
          properties:
            author:
              type: string
            publication_date:
              type: string
              format: date-time
            reading_time:
              type: string
    ContentResponse:
      type: object
      required: [id, content_type, title, price_cents, content_body, teaser, visibility]
      properties:
        id:
          type: string
        content_type:
          type: string
          enum:
            - markdown
          description: The type of content being uploaded
        title:
          type: string
          description: Content title
        content_body:
          type: string
          format: byte
          description: (Optional) Full article content, written in markdown and base64 encoded.
        teaser:
          type: string
          format: byte
          description: (Optional) Article teaser, written in markdown and base64 encoded.
        price_cents:
          type: integer
          description: Price for the content in cents.
        visibility:
          type: string
          enum: [public, unlisted, private]
          default: public
        metadata:
          type: object
          description: Flexible metadata for additional context
          additionalProperties: true
          properties:
            author:
              type: string
            # source:
            #   type: string
            publication_date:
              type: string
              format: date-time
            reading_time:
              type: string
            tags:
              type: array
              format: string
            paywall:
              type: object
              description: flexible data for managing paywall location
              properties:
                position:
                  type: integer
                  description: Character position of the paywall
                positioning_type:
                  type: string
                  enum:
                    - character
                    - paragraph
                  description: The mechanism for determining how positioning is calculated
                anchor:
                  type: string
                  description: Hash anchor of nearby text

    ContentListItem:
      type: object
      description: >
        Lightweight content representation returned by list and search endpoints.
        Omits `content_body` to keep list payloads small. Use the detail endpoint
        (`GET /v1/merchant/:store_id/content/:id`) to retrieve the full body.
      required: [id, content_type, title, price_cents, teaser, visibility, created_at]
      properties:
        id:
          type: string
        content_type:
          type: string
          enum: [markdown]
        title:
          type: string
        price_cents:
          type: integer
        teaser:
          type: [string, 'null']
          format: byte
          description: Article teaser, base64 encoded. Null when not set.
        visibility:
          type: string
          enum: [public, unlisted, private]
        created_at:
          type: string
          format: date-time

    ContentWithAccessResponse:
      description: >
        Full content detail plus real-time access and wallet context for a specific user.
        Returned by the seller/API-key `with_access` endpoint.
      allOf:
        - $ref: '#/components/schemas/ContentResponse'
        - type: object
          required: [access_info]
          properties:
            access_info:
              $ref: '#/components/schemas/ContentAccessInfo'

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [buyer, seller]

    PurchaseStatus:
      type: string
      enum: [completed, refunded, pending, reverted, failed]

    PurchaseResponse:
      type: object
      required: [id, content_id, content, buyer_id, buyer, seller_id, seller, amount_cents, timestamp, status]
      properties:
        id:
          type: string
        content_id:
          type: string
        content:
          type: object
          required: [id, content_type, title]
          properties:
            id:
              type: string
            content_type:
              type: string
            title:
              type: string
        buyer_id:
          type: string
        buyer:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        seller_id:
          type: string
        seller:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        amount_cents:
          type: integer
        timestamp:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/PurchaseStatus'

    MerchantSaleResponse:
      type: object
      required: [id, content_id, content, buyer_id, buyer, seller_id, seller, amount_cents, fees, status, timestamp]
      properties:
        id:
          type: string
        content_id:
          type: string
        content:
          type: object
          required: [id, content_type, title]
          properties:
            id:
              type: string
            content_type:
              type: string
            title:
              type: string
        buyer_id:
          type: string
        buyer:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        seller_id:
          type: string
        seller:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        amount_cents:
          type: integer
        fees:
          type: object
          required: [platform_fee_cents, store_net_cents, author_net_cents]
          description: Platform fee split. Values are 0 (not null) on non-completed purchases.
          properties:
            platform_fee_cents:
              type: integer
            store_net_cents:
              type: integer
            author_net_cents:
              type: integer
              description: 0 for content without an author
        status:
          $ref: '#/components/schemas/PurchaseStatus'
        timestamp:
          type: string
          format: date-time

    MonthlyData:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            cents:
              type: integer
            currency_iso:
              type: string

    InviteInfoResponse:
      type: object
      required: [invited_email, store_name, role, expires_at]
      properties:
        invited_email:
          type: string
        store_name:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
        expires_at:
          type: string
          format: date-time

    CheckoutStateResponse:
      type: object
      required: [content_id, content_title, price_cents, checkout_state]
      properties:
        content_id:
          type: string
        content_title:
          type: string
        price_cents:
          type: integer
        checkout_state:
          type: object
          required: [is_authenticated, has_purchased, next_required_action]
          properties:
            is_authenticated:
              type: boolean
            has_sufficient_funds:
              type: [boolean, 'null']
            has_purchased:
              type: boolean
            next_required_action:
              type: string
              enum: [authenticate, fund_wallet, purchase, view_content]

    WalletPaymentStatusResponse:
      type: object
      required: [status, updated_at, balance_cents]
      properties:
        status:
          type: string
          enum: [pending, completed, failed]
        updated_at:
          type: string
          format: date-time
        balance_cents:
          type: integer

    SalesSummaryResponse:
      type: object
      required: [total_revenue_cents, total_sales, monthly_revenue_cents, monthly_sales]
      properties:
        total_revenue_cents:
          type: integer
          description: Amount in cents
        total_sales:
          type: integer
          description: Total number of sales
        monthly_revenue_cents:
          type: object
          description: Monthly revenue data grouped by year and month. First level key is year (string), second level key is month number (string, 1-12)
          additionalProperties:
            type: object
            description: Monthly data for a specific year
            additionalProperties:
              type: integer
              description: Revenue data for a specific month
        monthly_sales:
          type: object
          description: Monthly sales count data grouped by year and month. First level key is year (string), second level key is month number (string, 1-12)
          additionalProperties:
            type: object
            description: Monthly data for a specific year
            additionalProperties:
              type: integer
              description: Number of sales for a specific month

security:
  - BearerAuth: []

paths:
  /v1/auth/signup:
    post:
      summary: Register a new user with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
