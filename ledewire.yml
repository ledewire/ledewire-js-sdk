  /v1/merchant/{store_id}/users:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store ID. The authenticated user must have a StoreUser record for this store.
    get:
      summary: List store members
      description: >
        Returns all StoreUser records for the given store.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
        Non-owner users (including `is_author: true`) receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Store members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MerchantUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Invite a user to the store
      description: >
        Adds a user as a member of the store.
        If the user already has an account, they are added immediately.
        If not, an invitation email is sent and a pending StoreUser is created.


        `is_author` defaults to `true`; set it explicitly to `false` to add
        a store member without authoring permissions.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantInviteRequest'
            examples:
              add_author:
                summary: Invite an existing user as an author
                value:
                  email: 'author@example.com'
              add_member_no_authorship:
                summary: Invite a member without author permissions
                value:
                  email: 'member@example.com'
                  is_author: false
      responses:
        '200':
          description: User added or invitation sent
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MerchantUser'
                  - $ref: '#/components/schemas/MerchantInviteResponse'
        '201':
          description: User added or invitation sent
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MerchantUser'
                  - $ref: '#/components/schemas/MerchantInviteResponse'
        '409':
          description: User is already a member of this store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/users/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store ID
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: StoreUser ID
    patch:
      summary: Update a store member's permissions
      description: >
        Toggles the `is_author` flag for a store member.
        Role (`owner`) can only be assigned via the platform admin UI.
        Owners cannot update their own record.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_author]
              properties:
                is_author:
                  type: boolean
            examples:
              grant_authorship:
                summary: Grant author permissions
                value:
                  is_author: true
              revoke_authorship:
                summary: Revoke author permissions
                value:
                  is_author: false
      responses:
        '200':
          description: Updated store member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantUser'
        '403':
          description: Forbidden — cannot modify own record or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Remove a store member
      description: >
        Removes a user from the store. Owners cannot remove themselves.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Removed successfully
        '403':
          description: Forbidden — cannot remove self or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/content:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store ID
    get:
      summary: List store content
      description: >
        Returns content for the given store.
        Owners and API keys see all content; `is_author` users see only their own content.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a new content item
      description: >
        Creates a new content item in the given store.


        **Authorship:**

        - Created by an `is_author` user → attributed to that user.

        - Created via API key → attributed to the store's `owner` (if one exists).

        - Created by an owner → attributed to the owner.


        **Authorization:** `owner` role, `is_author: true`, or API key with `full` permission.
        Users with neither receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Content'
            examples:
              markdownContent:
                value:
                  content_type: markdown
                  title: 'Sample Blog Post'
                  content_body: 'IyBUZXN0IFBvc3Q='
                  price_cents: 500
                  visibility: public
      responses:
        '201':
          description: Content created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
        '400':
          description: Invalid content parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient role or authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/content/search:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Search content by metadata
      description: >
        Search content using metadata key/value pairs. All criteria must match (AND logic).
        Results are scoped by role: owners see all content, `is_author` users see only their own.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [metadata]
              properties:
                metadata:
                  type: object
                  additionalProperties: true
                  minProperties: 1
      responses:
        '200':
          description: Matching content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentResponse'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/content/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Content ID
    get:
      summary: Get content by ID
      description: >
        Owners and API keys can fetch any content. `is_author` users can only fetch their own.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Content item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Content not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Update a content item
      description: >
        Update an existing content item.


        - `owner` and API key: can update any content, including reassigning
          the author via `store_user_id`.

        - `is_author: true` (non-owner): can only update their own content;
          `store_user_id` is ignored even if provided.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentUpdateRequest'
      responses:
        '200':
          description: Updated content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Content not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a content item
      description: >
        Permanently delete a content item.
        Owners and API keys can delete any content. `is_author` users can only delete their own.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Content deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Content not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

