name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Build, Lint, Type-check, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Validate published package structure
        run: |
          pnpm publint packages/node
          pnpm publint packages/browser

      - name: Check generated types are up to date with ledewire.yml
        run: |
          pnpm generate:types
          git diff --exit-code packages/core/src/api.gen.ts || (
            echo ""
            echo "ERROR: packages/core/src/api.gen.ts is out of date with ledewire.yml."
            echo "Run 'pnpm generate:types' locally and commit the updated file."
            exit 1
          )

      - name: Check docs/api is up to date
        run: |
          pnpm run docs
          # Only fail on structural changes (added/removed pages).
          # Content-only diffs in navigation.js/search.js are non-deterministic
          # across Node.js versions and are not meaningful signal.
          STRUCTURAL=$(git diff --name-status docs/api | grep -E '^[AD]' || true)
          if [ -n "$STRUCTURAL" ]; then
            echo ""
            echo "ERROR: docs/api has added or removed pages."
            echo "Run 'pnpm run docs' locally and commit the updated files."
            git diff --name-status docs/api
            exit 1
          fi
