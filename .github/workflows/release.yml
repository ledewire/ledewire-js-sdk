name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate npm token
        run: |
          WHOAMI=$(npm whoami --registry https://registry.npmjs.org 2>&1) || true
          if echo "$WHOAMI" | grep -q "npm error\|ENEEDAUTH\|ENOTFOUND\|EINVALIDNPMTOKEN"; then
            echo "::error::NPM_TOKEN is invalid or lacks publish permission. npm whoami output: $WHOAMI"
            exit 1
          fi
          echo "npm token is valid — authenticated as: $WHOAMI"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Creates a "Version Packages" PR, or publishes if that PR was just merged
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attach browser CDN bundle to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/browser/package.json').version")
          TAG="@ledewire/browser@${VERSION}"
          # Create the release if changesets didn't (e.g. first-publish with no changeset files)
          gh release create "$TAG" --title "$TAG" --generate-notes 2>/dev/null || true
          gh release upload "$TAG" \
            packages/browser/dist/ledewire.min.js \
            packages/browser/dist/ledewire.min.js.map \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Build and commit API docs
    needs: release
    runs-on: ubuntu-latest
    # Run on every push to main, not just on releases
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Generate TypeDoc API reference
        run: pnpm docs
      - name: Commit updated docs/api
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "docs: regenerate API reference [skip ci]"
            git pull --rebase origin main
            git push
          fi
