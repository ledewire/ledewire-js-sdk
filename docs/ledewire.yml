  /v1/auth/token/refresh:
    post:
      summary: Refresh an access token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRefreshRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'

  /v1/auth/merchant/stores:
    get:
      summary: List stores the authenticated user can manage
      description: >
        Returns all stores the authenticated user has a StoreUser record for.
        Requires a merchant JWT. The response includes `is_author` so
        clients can determine what actions the user may perform in each store.
      tags:
        - Merchant Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of manageable stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManageableStore'
              examples:
                stores:
                  summary: Stores the user manages
                  value:
                    - id: 'a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d'
                      name: 'My Store'
                      store_key: 'my-store'
                      role: 'owner'
                      is_author: true
                      logo: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (invalid token role)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/merchant/login/email:
    post:
      summary: Log in as a merchant with email and password
      description: >
        Authenticates a user and returns a store-agnostic merchant JWT.
        The token carries `role: merchant` with no embedded store context.
        Use `GET /v1/auth/merchant/stores` to discover which stores the user
        can manage, then pass the desired `store_id` as a URL parameter on
        merchant resource endpoints.
      tags:
        - Merchant Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantEmailLoginRequest'
            examples:
              login:
                summary: Email and password login
                value:
                  email: 'owner@example.com'
                  password: 'password123'
      responses:
        '200':
          description: Merchant token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAuthenticationResponse'
        '400':
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_credentials:
                  summary: Wrong password or unknown email
                  value:
                    error:
                      code: 404
                      message: 'Invalid email or password'
        '403':
          description: >
            Authenticated successfully but the account has no merchant store access.
            The credentials are valid; the account needs to be added as an owner
            or author to at least one store before it can use the merchant API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_merchant_access:
                  summary: Account exists but has no store associations
                  value:
                    error:
                      code: 403
                      message: 'This account does not have merchant access. Use a merchant or owner account.'

  /v1/auth/merchant/login/google:
    post:
      summary: Log in as a merchant with Google OAuth
      description: >
        Authenticates a user via Google OAuth and returns a store-agnostic merchant JWT.
      tags:
        - Merchant Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantGoogleLoginRequest'
      responses:
        '200':
          description: Merchant token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAuthenticationResponse'
        '400':
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >
            Google token is valid and the account was found, but the account has
            no merchant store access. This is the expected response when a personal
            Google account previously registered as a buyer is used on the merchant
            login endpoint. Use a different account or have the account added as
            an owner or author to a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_merchant_access:
                  summary: Buyer account authenticated via Google — no store associations
                  value:
                    error:
                      code: 403
                      message: 'This account does not have merchant access. Use a merchant or owner account.'
        '503':
          description: Google service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/merchant/password/reset-request:
    post:
      summary: Request a merchant password reset code
      description: >
        Sends a 6-digit reset code to the given email address if a matching account exists.
        Always returns 200 to prevent email enumeration.
      tags:
        - Merchant Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Password reset code sent (if account exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                reset_requested:
                  summary: Reset code sent (or silently suppressed for unknown email)
                  value:
                    message: 'If an account with this email exists, a reset code has been sent.'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_email:
                  summary: Invalid email format
                  value:
                    error:
                      code: 400
                      message: 'email must be a valid email address'
        '429':
          description: Too many requests (rate limit exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rate_limit:
                  summary: Rate limit exceeded
                  value:
                    error:
                      code: 429
                      message: 'Too many reset attempts. Please try again later.'

  /v1/auth/merchant/password/reset:
    post:
      summary: Reset merchant password using code
      description: >
        Validates the 6-digit reset code and replaces the user's password.
        The reset code is single-use and expires after a short window.
      tags:
        - Merchant Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, reset_code, password]
              properties:
                email:
                  type: string
                  format: email
                reset_code:
                  type: string
                  description: 6-digit numeric code received by email
                  example: '246810'
                password:
                  type: string
                  description: New password (minimum 6 characters)
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                reset_success:
                  summary: Password updated
                  value:
                    message: 'Password has been successfully reset.'
        '400':
          description: Invalid request, code, or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_code:
                  summary: Invalid or expired code
                  value:
                    error:
                      code: 400
                      message: 'Invalid or expired reset code'
                invalid_password:
                  summary: Password too short
                  value:
                    error:
                      code: 400
                      message: 'Failed to update password: Password is too short (minimum is 6 characters)'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: User not found
                  value:
                    error:
                      code: 404
                      message: 'User not found'

  /v1/merchant/{store_id}/users:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store ID. The authenticated user must have a StoreUser record for this store.
    get:
      summary: List store members
      description: >
        Returns a paginated list of all StoreUser records for the given store.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
        Non-owner users (including `is_author: true`) receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page. Maximum 100.
      responses:
        '200':
          description: Paginated list of store members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Invite a user to the store
      description: >
        Adds a user as a member of the store.
        If the user already has an account, they are added immediately.
        If not, an invitation email is sent and a pending StoreUser is created.


        `is_author` defaults to `true`; set it explicitly to `false` to add
        a store member without authoring permissions.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantInviteRequest'
            examples:
              add_author:
                summary: Invite an existing user as an author
                value:
                  email: 'author@example.com'
              add_member_no_authorship:
                summary: Invite a member without author permissions
                value:
                  email: 'member@example.com'
                  is_author: false
      responses:
        '200':
          description: User added or invitation sent
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MerchantUser'
                  - $ref: '#/components/schemas/MerchantInviteResponse'
        '201':
          description: User added or invitation sent
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MerchantUser'
                  - $ref: '#/components/schemas/MerchantInviteResponse'
        '409':
          description: User is already a member of this store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/users/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store ID
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: StoreUser ID
    patch:
      summary: Update a store member's permissions
      description: >
        Updates attributes for a store member. Supports toggling `is_author` and setting
        a per-author fee override (`author_fee_bps`). At least one field must be provided.
        `author_fee_bps: null` clears the per-author override, reverting to the store default.
        Role (`owner`) can only be assigned via the platform admin UI.
        Owners cannot update their own record.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_author:
                  type: boolean
                  description: Grant or revoke author permissions.
                author_fee_bps:
                  type: [integer, 'null']
                  description: Per-author fee override in basis points (0–10000). Set to `null` to revert to the store default.
            examples:
              grant_authorship:
                summary: Grant author permissions
                value:
                  is_author: true
              revoke_authorship:
                summary: Revoke author permissions
                value:
                  is_author: false
              set_author_fee:
                summary: Set a custom author fee of 18%
                value:
                  author_fee_bps: 1800
              clear_author_fee:
                summary: Clear the per-author fee override
                value:
                  author_fee_bps: null
      responses:
        '200':
          description: Updated store member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantUser'
        '403':
          description: Forbidden — cannot modify own record or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Remove a store member
      description: >
        Removes a user from the store. Owners cannot remove themselves.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Removed successfully
        '403':
          description: Forbidden — cannot remove self or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/content:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store ID
    get:
      summary: List store content
      description: >
        Returns a paginated list of content for the given store.
        Owners and API keys see all content; `is_author` users see only their own content.


        Use `page` and `per_page` to paginate through results. The response envelope always
        includes a `pagination` object with total counts and prev/next page numbers.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page. Maximum 100.
      responses:
        '200':
          description: Paginated list of content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContentList'
              examples:
                content_list:
                  summary: First page of mixed content types
                  value:
                    data:
                      - id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                        content_type: 'markdown'
                        title: 'Sample Blog Post'
                        teaser: 'IyBUZXN0IFBvc3RcblxuVGhpcyBpcyBhIHByZXZpZXcgb2YgdGhlIGJsb2cgcG9zdC4='
                        price_cents: 500
                        visibility: 'public'
                        created_at: '2026-01-15T10:30:00Z'
                        external_identifier: null
                      - id: 'd4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f9a'
                        content_type: 'external_ref'
                        title: 'Intro to Machine Learning'
                        teaser: 'QSBiZWdpbm5lci1mcmllbmRseSBpbnRyb2R1Y3Rpb24gdG8gTUwgY29uY2VwdHMu'
                        price_cents: 1500
                        visibility: 'public'
                        created_at: '2026-01-10T08:00:00Z'
                        external_identifier: 'vimeo:987654321'
                    pagination:
                      total: 84
                      per_page: 25
                      current_page: 1
                      total_pages: 4
                      next_page: 2
                      prev_page: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a new content item
      description: >
        Creates a new content item in the given store.


        **Authorship:**

        - Created by an `is_author` user → attributed to that user.

        - Created via API key → attributed to the store's `owner` (if one exists).

        - Created by an owner → attributed to the owner.


        **Authorization:** `owner` role, `is_author: true`, or API key with `full` permission.
        Users with neither receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Content'
            examples:
              markdownContent:
                summary: Markdown article
                value:
                  content_type: markdown
                  title: 'Sample Blog Post'
                  content_body: 'IyBUZXN0IFBvc3Q='
                  price_cents: 500
                  visibility: public
              externalRefContent:
                summary: External reference (Vimeo video)
                value:
                  content_type: external_ref
                  title: 'Intro to Machine Learning'
                  content_uri: 'https://vimeo.com/987654321'
                  external_identifier: 'vimeo:987654321'
                  teaser: 'QSBiZWdpbm5lci1mcmllbmRseSBpbnRyb2R1Y3Rpb24gdG8gTUwgY29uY2VwdHMu'
                  price_cents: 1500
                  visibility: public
      responses:
        '201':
          description: Content created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentResponse'
              examples:
                markdown_created:
                  summary: Markdown content created
                  value:
                    id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                    content_type: 'markdown'
                    title: 'Sample Blog Post'
                    content_body: 'IyBUZXN0IFBvc3Q='
                    teaser: ''
                    price_cents: 500
                    visibility: 'public'
                    metadata: {}
                    external_identifier: null
                external_ref_created:
                  summary: External reference content created
                  value:
                    id: 'd4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f9a'
                    content_type: 'external_ref'
                    title: 'Intro to Machine Learning'
                    content_uri: 'https://vimeo.com/987654321'
                    external_identifier: 'vimeo:987654321'
                    teaser: 'QSBiZWdpbm5lci1mcmllbmRseSBpbnRyb2R1Y3Rpb24gdG8gTUwgY29uY2VwdHMu'
                    price_cents: 1500
                    visibility: 'public'
                    metadata: {}
        '400':
          description: Invalid content parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient role or authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/content/search:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Search content
      description: >
        Search content by title (partial, case-insensitive), URI (partial, case-insensitive),
        and/or metadata key/value pairs (exact AND logic). At least one criterion must be supplied.
        Results are scoped by role: owners see all content, `is_author` users see only their own.
        Returns a paginated envelope identical to `GET /v1/merchant/{store_id}/content`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page. Maximum 100.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Case-insensitive partial match against the content title.
                uri:
                  type: string
                  description: Case-insensitive partial match against the content URI (external_ref content only).
                external_identifier:
                  type: string
                  description: Exact match against the content's external_identifier (e.g. 'vimeo:987654321').
                metadata:
                  type: object
                  additionalProperties: true
                  minProperties: 1
                  description: Exact key/value pairs to match in the content metadata (AND logic).
      responses:
        '200':
          description: Paginated matching content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContentList'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/content/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
