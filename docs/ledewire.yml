  /v1/seller/content:
    post:
      summary: Create a new piece of content
      tags:
        - Content
      description: >
        Supports the following content types:

        - **`markdown`** — written article, base64-encoded body stored in `content_body`

        - **`external_ref`** — proxy content pointing to an external resource (Vimeo, YouTube,
          PDF, etc.). The URI is stored in `content_uri` and is only revealed to buyers
          after a completed purchase.


        **Authorization:**

        Store manager tokens: only `owner` role and users with `is_author: true` may create content.
        Users with neither (no role, `is_author: false`) will receive a `403 Forbidden`.


        API key/secret authentication: permitted with `full` permission. The store's `owner`
        will be automatically set as the author if one exists; otherwise content is created
        without an author.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Content'
            examples:
