  /v1/merchant/{store_id}/sales/summary:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get sales summary
      description: >
        Returns aggregated sales totals and monthly breakdowns.


        **Scoping by role:**

        - `owner` or API key — summary across all store content.

        - `is_author` (non-owner) — summary scoped to content attributed to that author.


        **Authorization:** `owner` role, `is_author: true`, or API key. Users with neither receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sales summary data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/sales:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get content sales statistics
      description: >
        Returns a paginated list of sales statistics, one row per content item.
        Results are ordered by content title.


        **Scoping by role:**

        - `owner` or API key — all content in the store.

        - `is_author` (non-owner) — only content attributed to that author.


        **Authorization:** `owner` role, `is_author: true`, or API key. Users with neither receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page. Maximum 100.
      responses:
        '200':
          description: Paginated list of content sales statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSalesList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/sales/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get sale detail with fee breakdown
      description: >
        Returns the full detail of a single sale including the platform fee split
        (platform_fee_cents, store_net_cents, author_net_cents).
        The buyer-facing GET /v1/purchases/:id intentionally omits the fees object.


        **Scoping by role:**

        - `owner` or API key — any sale in the store.

        - `is_author` (non-owner) — only sales for content attributed to that author;
          attempting to access another author's sale returns `404 Not Found`.


        **Authorization:** `owner` role, `is_author: true`, or API key. Users with neither receive `403 Forbidden`.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sale detail with fee breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantSaleResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient permissions or store mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sale not found, belongs to a different store, or is outside the author's attributed content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/buyers:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get buyer statistics
      description: >
        Returns paginated, aggregated, anonymised buyer statistics.
        Results are ordered by total spend descending.


        **Scoping by role:**

        - `owner` or API key — all buyers across the entire store.

        - `is_author` (non-owner) — only buyers who purchased content attributed to that author.


        **Authorization:** `owner` role, `is_author: true`, or API key. Users with neither receive `403 Forbidden`.


        **Note:** Pagination slices the pre-aggregated result set in memory.
        For stores with a very large number of unique buyers, consider filtering
        by date range in a future API revision.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page. Maximum 100.
      responses:
        '200':
          description: Paginated buyer statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBuyersList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/config:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get store configuration
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Store configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  google_client_id:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/wallet/payment-session:
    post:
      summary: Initialize a wallet funding payment session
      description: >
        Creates a payment session for wallet funding and returns the necessary details for client-side payment processing.
        Currently implemented using Stripe payment intents. The client should use the returned client_secret with
        the payment provider's client library to collect payment details and process the payment.
        After payment is processed, the provider will send a webhook notification to confirm the payment status.
      tags:
        - Wallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletPaymentSessionRequest'
      responses:
        '200':
          description: Payment session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletPaymentSessionResponse'
              examples:
                success:
                  summary: Payment session created
                  value:
                    client_secret: 'pi_3MkLpgHxoRklNe0j1W96LQcG_secret_pCFpWjPDDVtT9YPtqtjvBQrXV'
                    session_id: 'pi_3MkLpgHxoRklNe0j1W96LQcG'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid amount
                  value:
                    error: 'Invalid amount_cents value.  Amount must be a positive integer'
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid token
                  value:
                    error: 'Invalid authentication token'
        '403':
          description: Forbidden - User lacks sufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  summary: Insufficient permissions
                  value:
                    error: 'Insufficient permissions to access this resource'
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                provider_error:
                  summary: Provider error
                  value:
                    error: 'Unable to create payment intent with provider'

  /v1/wallet/payment-status/{session_id}:
    get:
      summary: Check the status of a wallet payment
      description: >
        Allows clients to check the current status of a payment session.
        This endpoint can be polled after payment submission to determine
        when a webhook has been processed.
      tags:
        - Wallet
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment status information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, succeeded, completed, failed, canceled]

                  updated_at:
                    type: string
                    format: date-time
                  balance_cents:
                    type: integer
                    description: Current wallet balance if payment succeeded

  /v1/wallet/payment-webhook:
    post:
      summary: Webhook handler for wallet funding completion
      description: >
        Receives webhook notifications from payment providers for payment events.
        When a payment success event is received for a wallet funding transaction,
        the system will automatically update the transaction status and fund the user's wallet.
        Currently implemented for Stripe webhook events.
      tags:
        - Wallet
      security: [] # No authentication required for payment provider webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payment provider event object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid token
                  value:
                    error: 'Invalid authentication token'
        '403':
          description: Forbidden - User lacks sufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  summary: Insufficient permissions
                  value:
                    error: 'Insufficient permissions to access this resource'
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                provider_error:
                  summary: Provider error
                  value:
                    error: 'Unable to verify transaction with provider'

  /v1/webhooks/payment:
    post:
      summary: Generic payment provider webhook endpoint
      description: >
        Receives webhook notifications from payment providers for all types of events.
        This endpoint handles all payment provider events and routes them to the appropriate handlers.
        Currently implemented for Stripe webhook events.
      tags:
        - Webhooks
      security: [] # No authentication required for payment provider webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payment provider event object
