  /v1/x402/contents/{id}:
    get:
      summary: Fetch content via x402 payment protocol
      description: >
        Implements the x402 v2 payment protocol using the `ledewire-wallet` scheme.
        On the first request (no `PAYMENT-SIGNATURE` header) the server responds with
        `402 Payment Required` and a `PAYMENT-REQUIRED` header describing the price and
        a single-use nonce. The client retries with a `PAYMENT-SIGNATURE` header
        containing the buyer JWT and nonce. On success the server responds with `200`,
        a `PAYMENT-RESPONSE` header with the settlement result, and the content body.

        **Short-circuits (no 402 round-trip):**
        - Free content (`price_cents: 0`) — returns `200` immediately.
        - Returning purchaser — if `Authorization` header is present and the resolved
          buyer already has a completed purchase, returns `200` directly.
      tags:
        - x402
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Content UUID
        - in: header
          name: PAYMENT-SIGNATURE
          required: false
          schema:
            type: string
          description: >-
            Base64-encoded x402 v2 PaymentPayload JSON. Required for paid content
            (unless returning purchaser short-circuit applies). The optional
            `extensions.payment-identifier` field accepts a stable UUID; if the
            server has already settled a payment for that identifier it returns the
            original PAYMENT-RESPONSE from cache without re-charging — safe to retry
            on network errors.
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
          description: Optional Bearer JWT. If present and the buyer has already purchased this content, returns 200 directly without a 402 round-trip.
      responses:
        '200':
          description: Payment settled; content delivered.
          headers:
            PAYMENT-RESPONSE:
              schema:
                type: string
              description: >
                Base64-encoded x402 v2 SettlementResponse JSON. Omitted for free content and
                when the returning-purchaser short-circuit applies (no new settlement).
                The decoded JSON includes `accessToken` — a short-lived RS256-signed JWT
                (default 24h TTL) that third-party proxies and CMS plugins can verify offline
                against `/.well-known/x402-jwks.json`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/X402ContentResponse'
        '402':
          description: Payment required. PAYMENT-REQUIRED header contains the x402 v2 PaymentRequired JSON (Base64-encoded).
          headers:
            PAYMENT-REQUIRED:
              schema:
                type: string
              description: >
                Base64-encoded x402 v2 PaymentRequired JSON describing accepted schemes, price, and
                payment parameters. The `accepts[0].extra` object contains `nonce` (single-use token),
                `expiresAt` (Unix timestamp), and `contentId` (UUID of the content being purchased).
                The `extensions` block contains two sub-objects: `payment-identifier: { supported: true }`
                (server advertises idempotent retry support — clients should generate a stable UUID per
                logical fetch and include it in `extensions.payment-identifier` of the PAYMENT-SIGNATURE
                to avoid double-charging on network errors), and `ledewire-wallet` (discovery block with
                `apiBase` [request-derived, environment-aware], `authEndpoint` [`/v1/auth/login/buyer-api-key`],
                `signupUrl` [configurable via `LEDEWIRE_SIGNUP_URL`], `schemeVersion` [`ledewire:v1`],
                and `contentId` [UUID of the Ledewire content record]). Clients such as `@ledewire/x402-client`
                use the `ledewire-wallet` block to self-configure without hardcoding the API location.
                `contentId` is essential for the Worker gate case where the origin URL carries no Ledewire
                identifier — the client reads it from here to construct the `PAYMENT-SIGNATURE` payload.
        '400':
          description: Malformed PAYMENT-SIGNATURE (invalid Base64 or JSON), unsupported x402Version, mismatched scheme/network, or contentId mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid JWT in PAYMENT-SIGNATURE payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: JWT in PAYMENT-SIGNATURE belongs to a non-buyer role (merchant or store-manager).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Content not found or not publicly visible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Insufficient wallet balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded (30 requests per minute per IP).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/x402/verify-origin:
    get:
      summary: Verify that a URL is a registered Ledewire content item
      description: >
        Unauthenticated endpoint used by the browser extension, JS snippet, and proxy
        to confirm that a URL is legitimately registered as a Ledewire content item
        before showing any payment UI. Returns `verified: false` silently for unknown
        URLs to prevent enumeration and to avoid misleading users.

        Responses are HTTP-cached for the configured TTL (default 1 hour).
        New content registrations propagate within that window.
      tags:
        - x402
      security: []
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
            format: uri
          description: Absolute URL of the page to verify (e.g. https://theirsite.com/articles/slug)
      responses:
        '200':
          description: >
            Always returns 200. `verified: true` means the URL is registered;
            `verified: false` means it is not (or the URL was invalid).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VerifyOriginVerified'
                  - $ref: '#/components/schemas/VerifyOriginUnverified'
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /.well-known/x402-jwks.json:
    get:
      summary: JSON Web Key Set for x402 accessToken verification
      description: >
        Publishes the RS256 public key used to sign `accessToken` values included in
        `PAYMENT-RESPONSE`. Third-party proxies and CMS plugins fetch this once (and
        cache it for 24 hours) to verify access tokens offline without calling Ledewire
        on every request.

        Standard JWKS format (RFC 7517). The `kid` claim in the access token matches
        the `kid` in the JWKS entry.
      tags:
        - x402
      security: []
      responses:
        '200':
          description: JWKS document
          headers:
            Cache-Control:
              schema:
                type: string
              description: max-age=86400, public
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'
        '503':
          description: Key material unavailable (credentials not configured).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/pricing_rules:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store UUID. The authenticated user must have an owner StoreUser record for this store.
    get:
      summary: List active pricing rules
      description: >
        Returns all active `ContentPricingRule` records for the store, ordered by creation date descending.


        **Authorization:** merchant JWT (any store member) or API key with `view` or `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Array of active pricing rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MerchantPricingRule'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a pricing rule
      description: >
        Creates a new active `ContentPricingRule` for the store.
        The domain in `url_pattern` must have a verified `StoreDomainVerification` record
        for this store before a rule can be created.


        Wildcards: `*` matches any path segment; `**` matches across path separators.
        Example: `https://example.com/articles/*` gates all article pages.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url_pattern, price_cents]
              properties:
                url_pattern:
                  type: string
                  description: Glob URL pattern. Must begin with http:// or https://. Supports * and ** wildcards only.
                  example: 'https://example.com/articles/*'
                price_cents:
                  type: integer
                  minimum: 0
                  description: Price in cents to charge for access to matching URLs.
                  example: 150
      responses:
        '201':
          description: Pricing rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantPricingRule'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — non-owner attempting write operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable — domain not verified, invalid pattern, or negative price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/pricing_rules/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: UUID of the pricing rule.
    delete:
      summary: Deactivate a pricing rule
      description: >
        Soft-deletes the rule by setting `active: false`. The record is retained for
        audit purposes (existing lazily-registered `Content` records reference the rule
        ID in `metadata.paywall.rule_id`). The rule is immediately excluded from URL
        matching.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: "Rule deactivated \u2014 returns the updated rule with active: false"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantPricingRule'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/domains:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
        description: Store UUID.
    get:
      summary: List domain verifications
      description: >
        Returns all `StoreDomainVerification` records for the store, ordered by creation
        date descending. Each record includes the DNS TXT record name and value the
        store owner must publish to complete verification.


        **Authorization:** merchant JWT (any store member) or API key with `view` or `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Array of domain verification records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MerchantDomainVerification'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a domain for verification
      description: >
        Creates a new `StoreDomainVerification` record in `pending` status and returns
        the DNS TXT record details the store owner must publish.
        `www.` is stripped automatically — adding `www.example.com` stores `example.com`.
        A store may add multiple domains.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  description: Domain to verify (www. prefix is stripped automatically).
                  example: 'example.com'
      responses:
        '201':
          description: Domain verification record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantDomainVerification'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable — domain already added for this store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/domains/{id}:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: UUID of the domain verification record.
    delete:
      summary: Remove a domain verification
      description: >
        Hard-deletes the `StoreDomainVerification` record. Any pricing rules whose
        `url_pattern` host matches this domain become inert — the `MatchUrl` service
        re-checks domain verification status at match time and will not fire for them.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Domain verification deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Domain verification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/merchant/{store_id}/domains/verify:
    parameters:
      - name: store_id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Trigger DNS verification check
      description: >
        Enqueues `DomainVerifyJob` to perform an asynchronous DNS TXT record check for
        the given domain. Returns `202 Accepted` immediately; poll
        `GET /v1/merchant/{store_id}/domains` to observe the resulting `status` change.


        This endpoint accepts the **domain string** rather than a record ID because the
        dashboard UI is stateless and does not retain the `StoreDomainVerification` UUID
        between the "Add domain" and "Verify" steps.


        **Authorization:** `owner` role (merchant JWT) or API key with `full` permission.
      tags:
        - Merchant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  description: Domain to check (www. prefix is stripped automatically).
                  example: 'example.com'
      responses:
        '202':
          description: Verification job enqueued
          content:
            application/json:
              schema:
                type: object
                required: [queued, domain, status]
                properties:
                  queued:
                    type: boolean
                    example: true
                  domain:
                    type: string
                    example: 'example.com'
                  status:
                    type: string
                    enum: [pending, verified, failed]
                    description: Current status at time of enqueueing (not the final result).
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Domain has not been added for this store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
