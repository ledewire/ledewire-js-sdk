  /v1/seller/content/search:
    post:
      summary: Search content
      tags:
        - Content
      description: >
        Search for content by title (partial, case-insensitive), URI (partial, case-insensitive),
        and/or metadata key/value pairs (exact AND logic). At least one criterion must be supplied.
        Metadata search supports internal reference identifiers such as vimeo_id, external_url,
        or any custom metadata fields.


        **Required Permission:** `view` or `full`
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Case-insensitive partial match against the content title.
                uri:
                  type: string
                  description: Case-insensitive partial match against the content URI (external_ref content only).
                external_identifier:
                  type: string
                  description: Exact match against the content's external_identifier (e.g. 'vimeo:987654321').
                metadata:
                  type: object
                  description: Exact key/value pairs to match in the content metadata (AND logic).
                  additionalProperties: true
                  minProperties: 1
            examples:
              searchByTitle:
                summary: Search by title
                value:
                  title: 'Introduction'
              searchByUri:
                summary: Search by URI
                value:
                  uri: 'example.com'
              searchByVimeoId:
                summary: Search by Vimeo ID
                value:
                  metadata:
                    vimeo_id: '123456789'
              searchByExternalIdentifier:
                summary: Search by external_identifier
                value:
                  external_identifier: 'vimeo:987654321'
              searchByExternalUrl:
                summary: Search by external URL
                value:
                  metadata:
                    external_url: 'https://example.com/page'
              searchByTitleAndMetadata:
                summary: Search by title and metadata
                value:
                  title: 'Tutorial'
                  metadata:
                    category: 'tutorial'
              searchByCustomField:
                summary: Search by custom metadata field
                value:
                  metadata:
                    internal_ref: 'PROJ-2024-001'
      responses:
        '200':
          description: List of matching content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentResponse'
              examples:
                matching_content:
                  summary: Content matching search criteria
                  value:
                    - id: 'b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e'
                      content_type: 'markdown'
                      title: 'Video Tutorial: Introduction'
                      teaser: 'Learn the basics in this introductory video tutorial'
                      price_cents: 500
                      visibility: 'public'
                      created_at: '2025-05-18T10:00:00Z'
                empty_results:
                  summary: No matching content found
                  value: []
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_metadata:
                  summary: Metadata parameter missing
                  value:
                    error:
                      code: 400
                      message: 'metadata is missing'
                empty_metadata:
                  summary: Empty metadata object
                  value:
                    error:
                      code: 400
                      message: 'metadata must contain at least one key/value pair'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Invalid or missing token
                  value:
                    error:
                      code: 401
                      message: 'Invalid authentication token'

