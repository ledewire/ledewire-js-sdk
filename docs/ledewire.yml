openapi: 3.1.0
info:
  title: LedeWire API
  version: 1.1.0
  description: >
    LedeWire API for buyer/seller authentication, wallet funding, content purchases, and seller content management.

servers:
  - url: https://api.ledewire.com
    description: Production server
  - url: https://api-staging.ledewire.com
    description: Staging server
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT Bearer token obtained from authentication endpoints.


        **Seller Permission Levels:**

        - **`view` permission** - Read-only access. Obtained by authenticating with API key only (without secret).

        - **`full` permission** - Full read/write access. Obtained by authenticating with both API key and API secret.


        Use the appropriate authentication method based on your use case:

        - For read-only operations (listing, viewing, searching content), authenticate with API key only to receive `view` permission

        - For write operations (creating, updating, deleting content), authenticate with API key + secret to receive `full` permission

  schemas:
    PublicConfigResponse:
      type: object
      description: Platform-level public configuration. No authentication required.
      required: [google_client_id]
      properties:
        google_client_id:
          type: string
          description: Google OAuth client ID for initialising the Google Identity Services library.

    ContentAccessInfo:
      type: object
      required:
        [user_id, has_purchased, has_sufficient_funds, wallet_balance_cents, next_required_action]
      properties:
        user_id:
          type: [string, null]
        has_purchased:
          type: boolean
        has_sufficient_funds:
          type: boolean
        wallet_balance_cents:
          type: integer
        next_required_action:
          type: string
          enum: [authenticate, fund_wallet, purchase, none]

    AuthenticationResponse:
      type: object
      required: [token_type, access_token, refresh_token, expires_at]
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9..VSFsm5ysjtZLheVfhv6DWwH1A9zn_WA6rnGOlPR1R3U
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
          description: When the Access Token expires

    MerchantAuthenticationResponse:
      type: object
      description: Token response for merchant authentication. Includes stores the user has access to so the client can prompt for store selection.
      required: [token_type, access_token, refresh_token, expires_at, stores]
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        stores:
          type: array
          description: Stores the authenticated user can manage, for store-selection on the client.
          items:
            $ref: '#/components/schemas/MerchantLoginStore'

    MerchantLoginStore:
      type: object
      description: A store the authenticated merchant user has access to.
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, author]
          description: Derived role. `owner` if the user owns this store; `author` if they have author permissions only.

    JWTClaims:
      type: object
      properties:
        sub:
          type: string
          description: User or Store identifier
        role:
          type: string
          enum: [buyer, seller-view, seller-full, merchant]
        seller_claims:
          type: object
          properties:
            seller_id:
              type: string
        buyer_claims:
          type: object
          properties:
            user_id:
              type: string
            email:
              type: string
        user_claims:
          type: object
          description: Present on merchant tokens
          properties:
            id:
              type: string
            email:
              type: string
            full_name:
              type: string
        iat:
          type: integer
        exp:
          type: integer
        nbf:
          type: integer
        iss:
          type: string
        aud:
          type: string
        token_metadata:
          type: object
          properties:
            created_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            token_id:
              type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string

    AuthSignupRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string

    AuthLoginEmailRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    AuthLoginOAuthRequest:
      type: object
      properties:
        id_token:
          type: string

    MerchantEmailLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    MerchantGoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string

    AuthLoginApiKeyRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
        secret:
          type: string

    AuthLoginBuyerApiKeyRequest:
      type: object
      required: [key, secret]
      properties:
        key:
          type: string
          description: Structured buyer API key (e.g. bktst_abc123)
        secret:
          type: string
          description: 64-char hex secret, shown once at creation

    UserApiKey:
      type: object
      required: [id, name, key, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key:
          type: string
          description: Structured public identifier (e.g. bktst_abc123)
        last_used_at:
          type: [string, 'null']
          format: date-time
        spending_limit_cents:
          type: [integer, 'null']
          description: Maximum cumulative spend in cents. null = no limit.
        created_at:
          type: string
          format: date-time

    UserApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Human-readable label for the key
        spending_limit_cents:
          type: integer
          nullable: true
          description: Optional spend ceiling in cents

    UserApiKeyCreateResponse:
      type: object
      required: [id, key, secret]
      description: Returned once only at creation. The secret is not stored and cannot be retrieved again.
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Structured public identifier (e.g. bktst_abc123)
        secret:
          type: string
          description: 64-char hex authentication secret. Store immediately — shown once only.

    AuthTokenRefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string

    ManageableStore:
      type: object
      required: [id, name, store_key, role, is_author, logo]
      properties:
        id:
          type: string
        name:
          type: string
        store_key:
          type: string
        role:
          type: string
          enum: [owner, author]
          description: Derived role. `owner` if the user owns this store; `author` if they have author permissions only.
        is_author:
          type: boolean
          description: Whether the authenticated user has author permissions for this store.
        logo:
          type: [string, 'null']

    MerchantUser:
      type: object
      required:
        [id, user_id, store_id, role, is_author, author_fee_bps, invited_at, accepted_at, email]
      properties:
        id:
          type: string
        user_id:
          type: [string, 'null']
        store_id:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
          description: Ownership flag expressed as a string. `owner` when `is_owner` is true; `null` for non-owner members (authors or uninvited users).
        is_author:
          type: boolean
          description: Whether this user can create and manage their own content.
        author_fee_bps:
          type: [integer, 'null']
          description: Per-author fee override in basis points (1/100th of a percent). Overrides the store's `default_author_fee_bps` when set. `null` means the store default applies.
        invited_at:
          type: [string, 'null']
          format: date-time
        accepted_at:
          type: [string, 'null']
          format: date-time
        email:
          type: [string, 'null']

    MerchantInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          description: Email address of the user to invite to the store.
        is_author:
          type: boolean
          default: true
          description: Whether to grant author permissions. Defaults to `true`.
        author_fee_bps:
          type: [integer, 'null']
          description: Per-author fee override in basis points (0–10000). Overrides the store's `default_author_fee_bps`. `null` or omitted means the store default applies.

    MerchantInviteResponse:
      type: object
      required: [invitation_token, email, role, is_author, expires_at]
      properties:
        invitation_token:
          type: string
        email:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
        is_author:
          type: boolean
        author_fee_bps:
          type: [integer, 'null']
          description: Per-author fee override set at invitation time.
        expires_at:
          type: string
          format: date-time

    WalletPaymentSessionRequest:
      type: object
      required: [amount_cents]
      properties:
        amount_cents:
          type: integer
          description: Amount to fund the wallet in cents
        currency:
          type: string
          default: usd
          description: Currency code (defaults to USD)
        metadata:
          type: object
          description: Additional metadata to include with the payment session
          additionalProperties: true

    WalletPaymentSessionResponse:
      type: object
      required: [client_secret, session_id, public_key]
      properties:
        client_secret:
          type: string
          description: The client secret used by the payment widget to confirm the payment
        session_id:
          type: string
          description: The ID of the created payment session
        public_key:
          type: string
          description: The payment public key to be used during the payment processing

    PaymentWebhookEvent:
      type: object
      description: A payment provider webhook event object
      properties:
        id:
          type: string
          description: Unique identifier for the event
        type:
          type: string
          description: Type of event (e.g., payment_intent.succeeded, payment_intent.payment_failed)
        data:
          type: object
          description: Event data containing the object that triggered the event
          additionalProperties: true

    WalletBalanceResponse:
      type: object
      required: [balance_cents]
      properties:
        balance_cents:
          type: integer

    WalletTransactionItem:
      type: object
      required:
        [
          id,
          type,
          reason,
          amount_cents,
          balance_after_cents,
          status,
          reference_id,
          description,
          occurred_at,
        ]
      properties:
        id:
          type: string
          description: ID of the transaction entry (matches the source record)
        type:
          type: string
          enum: [credit, debit]
          description: Direction relative to the user's wallet
        reason:
          type: string
          enum: [wallet_funding, purchase, refund]
          description: What caused this wallet movement
        amount_cents:
          type: integer
          description: Always positive; direction expressed by `type`
        balance_after_cents:
          type: integer
          description: Running wallet balance immediately after this event
        status:
          type: string
          enum: [completed, pending, failed, cancelled]
        reference_id:
          type: string
          description: ID of the source record (Purchase or FundingTransfer)
        description:
          type: string
          description: Human-readable label suitable for display
        occurred_at:
          type: string
          format: date-time
          description: created_at of the source record

    PurchaseCreateRequest:
      type: object
      properties:
        content_id:
          type: string
        price_cents:
          type: integer

    PurchaseVerifyResponse:
      type: object
      required: [has_purchased]
      properties:
        has_purchased:
          type: boolean
        purchase_details:
          type: object
          properties:
            purchase_id:
              type: string
            purchase_date:
              type: string
              format: date-time
        checkout_readiness:
          type: object
          properties:
            is_authenticated:
              type: boolean
            has_sufficient_funds:
              type: boolean

    ContentUpdateRequest:
      type: object
      additionalProperties: false
      description: >
        Update request for content. `content_body` applies to `markdown` content;
        `content_uri` and `external_identifier` apply to `external_ref` content.
      properties:
        title:
          type: string
          description: Content title
        content_body:
          type: string
          format: byte
          description: Full article body in markdown, base64 encoded. For `markdown` content only. Must be base64-encoded before sending (e.g. `btoa(markdownText)`).
        content_uri:
          type: string
          description: URI of the resource. Required for `external_ref` content; optional for `markdown` content.
          example: https://vimeo.com/123456789
        external_identifier:
          type: [string, 'null']
          description: Namespaced platform ID, e.g. `vimeo:123456789`. For `external_ref` content only.
          example: vimeo:123456789
        teaser:
          type: string
          format: byte
          description: Content teaser, base64 encoded. Must be base64-encoded before sending (e.g. `btoa(teaserText)`)
        price_cents:
          type: integer
          minimum: 1
          description: Price in cents (must be greater than 0)
        visibility:
          type: string
          enum: [public, unlisted]
        metadata:
          type: object
          additionalProperties: true
        store_user_id:
          type: [string, 'null']
          description: >
            Assign or clear content authorship. Provide the `id` of a `StoreUser` from
            `GET /v1/merchant/{store_id}/users` to assign an author, or `null` to clear attribution.
            Only available to `owner` role and API key auth.
            Users with `is_author: true` (non-owner) cannot reassign their own content.

    SalesStatisticsItem:
      type: object
      required: [content_id, title, total_sales, total_revenue_cents]
      properties:
        content_id:
          type: string
        title:
          type: string
        total_sales:
          type: integer
        total_revenue_cents:
          type: integer

    BuyerStatisticsItem:
      type: object
      description: >
        Seller-scoped buyer aggregate statistics for reporting.


        Prefer `buyer_ref` over any global buyer identifier.
      required:
        [
          buyer_ref,
          purchases_count,
          total_spent_cents,
          first_purchase_at,
          last_purchase_at,
          buyer_status,
        ]
      properties:
        buyer_ref:
          type: string
          description: Opaque, seller-scoped identifier for a buyer (not the global user id).
        purchases_count:
          type: integer
          description: Number of completed purchases by this buyer for this seller.
        total_spent_cents:
          type: integer
          description: Total amount spent by this buyer for this seller, in cents.
        first_purchase_at:
          type: string
          format: date-time
          description: Timestamp of the buyer's first completed purchase for this seller.
        last_purchase_at:
          type: string
          format: date-time
          description: Timestamp of the buyer's most recent completed purchase for this seller.
        buyer_status:
          type: string
          description: Coarse segmentation label derived by the platform.
          enum: [new, repeat, inactive]

    AhoyEvent:
      type: object
      properties:
        name:
          type: string
          description: Name of the event being tracked
        properties:
          type: object
          description: Additional properties for the event
          additionalProperties: true
        time:
          type: string
          format: date-time
          description: When the event occurred
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the event
        visit_id:
          type: string
          format: uuid
          description: ID of the visit associated with the event

    AhoyVisit:
      type: object
      properties:
        visit_token:
          type: string
          description: Unique token for this visit
        visitor_token:
          type: string
          description: Token identifying the visitor
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the visit
        ip:
          type: string
          description: IP address of the visitor
        user_agent:
          type: string
          description: User agent string
        referrer:
          type: string
          description: Referrer URL
        referring_domain:
          type: string
          description: Domain of the referrer
        landing_page:
          type: string
          description: Landing page URL
        browser:
          type: string
          description: Browser name
        os:
          type: string
          description: Operating system
        device_type:
          type: string
          description: Type of device
        country:
          type: string
          description: Country of the visitor
        region:
          type: string
          description: Region of the visitor
        city:
          type: string
          description: City of the visitor
        latitude:
          type: number
          format: float
          description: Latitude coordinate
        longitude:
          type: number
          format: float
          description: Longitude coordinate
        utm_source:
          type: string
          description: UTM source parameter
        utm_medium:
          type: string
          description: UTM medium parameter
        utm_term:
          type: string
          description: UTM term parameter
        utm_content:
          type: string
          description: UTM content parameter
        utm_campaign:
          type: string
          description: UTM campaign parameter
        app_version:
          type: string
          description: App version (for native apps)
        os_version:
          type: string
          description: OS version (for native apps)
        platform:
          type: string
          description: Platform (for native apps)
        started_at:
          type: string
          format: date-time
          description: When the visit started

    AhoyEventRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Name of the event being tracked
        properties:
          type: object
          description: Additional properties for the event
          additionalProperties: true
        time:
          type: string
          format: date-time
          description: When the event occurred (defaults to current time)
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the event
        visit_id:
          type: string
          format: uuid
          description: ID of the visit associated with the event

    AhoyVisitRequest:
      type: object
      properties:
        visit_token:
          type: string
          description: Unique token for this visit
        visitor_token:
          type: string
          description: Token identifying the visitor
        user_id:
          type: string
          format: uuid
          description: ID of the user associated with the visit
        ip:
          type: string
          description: IP address of the visitor
        user_agent:
          type: string
          description: User agent string
        referrer:
          type: string
          description: Referrer URL
        referring_domain:
          type: string
          description: Domain of the referrer
        landing_page:
          type: string
          description: Landing page URL
        browser:
          type: string
          description: Browser name
        os:
          type: string
          description: Operating system
        device_type:
          type: string
          description: Type of device
        country:
          type: string
          description: Country of the visitor
        region:
          type: string
          description: Region of the visitor
        city:
          type: string
          description: City of the visitor
        latitude:
          type: number
          format: float
          description: Latitude coordinate
        longitude:
          type: number
          format: float
          description: Longitude coordinate
        utm_source:
          type: string
          description: UTM source parameter
        utm_medium:
          type: string
          description: UTM medium parameter
        utm_term:
          type: string
          description: UTM term parameter
        utm_content:
          type: string
          description: UTM content parameter
        utm_campaign:
          type: string
          description: UTM campaign parameter
        app_version:
          type: string
          description: App version (for native apps)
        os_version:
          type: string
          description: OS version (for native apps)
        platform:
          type: string
          description: Platform (for native apps)
        started_at:
          type: string
          format: date-time
          description: When the visit started (defaults to current time)

    Content:
      type: object
      description: >
        Create request body for content. Required fields vary by `content_type`:
        `markdown` requires `content_body`; `external_ref` requires `content_uri`.
        Both types accept an optional `content_uri` link.
      required: [content_type, title, price_cents]
      properties:
        content_type:
          type: string
          enum:
            - markdown
            - external_ref
          description: The type of content being created.
        title:
          type: string
          description: Content title
        content_body:
          type: string
          format: byte
          description: Full article body in markdown, base64 encoded. Required when `content_type` is `markdown`. Must be base64-encoded before sending (e.g. `btoa(markdownText)`).
        content_uri:
          type: string
          description: URI of the resource. Required when `content_type` is `external_ref`; optional for `markdown` content.
          example: https://vimeo.com/123456789
        external_identifier:
          type: string
          description: Optional namespaced platform ID, e.g. `vimeo:123456789` or `youtube:dQw4w9WgXcQ`.
          example: vimeo:123456789
        teaser:
          type: string
          format: byte
          description: (Optional) Article teaser, written in markdown and base64 encoded. Must be base64-encoded before sending (e.g. `btoa(teaserText)`).
        price_cents:
          type: integer
          minimum: 1
          description: Price for the content in cents.
        visibility:
          type: string
          enum: [public, unlisted]
          default: public
        metadata:
          type: object
          description: Flexible metadata for additional context
          additionalProperties: true
          properties:
            author:
              type: string
            publication_date:
              type: string
              format: date-time
            reading_time:
              type: string
    ContentResponse:
      type: object
      description: >
        Response shape for a single content item. The presence of `content_body` vs
        `content_uri` depends on `content_type`: `markdown` includes `content_body`;
        `external_ref` includes `content_uri` (the external URI) and optionally
        `external_identifier`.
      required: [id, content_type, title, price_cents, teaser, visibility]
      properties:
        id:
          type: string
        content_type:
          type: string
          enum:
            - markdown
            - external_ref
          description: The type of content.
        title:
          type: string
          description: Content title
        content_body:
          type: [string, 'null']
          format: byte
          description: Full article body in markdown, base64 encoded. Present when `content_type` is `markdown`. Must be base64-decoded before rendering (e.g. `atob(content.content_body ?? '')`).
        content_uri:
          type: [string, 'null']
          description: URI of the external resource. Present when `content_type` is `external_ref`.
          example: https://vimeo.com/123456789
        external_identifier:
          type: [string, 'null']
          description: Namespaced platform ID, e.g. `vimeo:123456789`. Present on `external_ref` content.
          example: vimeo:123456789
        resource_url:
          type: [string, 'null']
          description: Canonical URL of this content on its origin site. Used by the x402 verify-origin endpoint to bind a third-party page to a Ledewire content record.
        teaser:
          type: string
          format: byte
          description: Article teaser, base64 encoded. Must be base64-decoded before rendering (e.g. `atob(content.teaser ?? '')`).
        price_cents:
          type: integer
          description: Price for the content in cents.
        visibility:
          type: string
          enum: [public, unlisted, private]
          default: public
        metadata:
          type: object
          description: Flexible metadata for additional context
          additionalProperties: true
          properties:
            author:
              type: string
            # source:
            #   type: string
            publication_date:
              type: string
              format: date-time
            reading_time:
              type: string
            tags:
              type: array
              format: string
            paywall:
              type: object
              description: flexible data for managing paywall location
              properties:
                position:
                  type: integer
                  description: Character position of the paywall
                positioning_type:
                  type: string
                  enum:
                    - character
                    - paragraph
                  description: The mechanism for determining how positioning is calculated
                anchor:
                  type: string
                  description: Hash anchor of nearby text

    PaginationMeta:
      type: object
      description: Pagination metadata returned on all paginated list endpoints.
      required: [total, per_page, current_page, total_pages]
      properties:
        total:
          type: integer
          description: Total number of records matching the query.
          example: 84
        per_page:
          type: integer
          description: Maximum number of records returned per page.
          example: 25
        current_page:
          type: integer
          description: The current page number (1-based).
          example: 2
        total_pages:
          type: integer
          description: Total number of pages.
          example: 4
        next_page:
          type: [integer, 'null']
          description: Next page number, or null if on the last page.
          example: 3
        prev_page:
          type: [integer, 'null']
          description: Previous page number, or null if on the first page.
          example: 1

    PaginatedContentList:
      type: object
      description: Paginated list of content items.
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContentListItem'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedSalesList:
      type: object
      description: Paginated list of content sales statistics.
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SalesStatisticsItem'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedBuyersList:
      type: object
      description: Paginated list of anonymised buyer statistics.
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BuyerStatisticsItem'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedUsersList:
      type: object
      description: Paginated list of store members.
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MerchantUser'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ContentListItem:
      type: object
      description: >
        Lightweight content representation returned by list and search endpoints.
        Omits `content_body` to keep list payloads small. Use the detail endpoint
        (`GET /v1/merchant/:store_id/content/:id`) to retrieve the full body.
      required: [id, content_type, title, price_cents, teaser, visibility, created_at, content_uri]
      properties:
        id:
          type: string
        content_type:
          type: string
          enum: [markdown, external_ref]
        title:
          type: string
        price_cents:
          type: integer
        teaser:
          type: [string, 'null']
          format: byte
          description: Article teaser, base64 encoded. Null when not set. Must be base64-decoded before rendering (e.g. `atob(item.teaser ?? '')`).
        visibility:
          type: string
          enum: [public, unlisted, private]
        created_at:
          type: string
          format: date-time
        content_uri:
          type: [string, 'null']
          description: External URI for `external_ref` content; optional supplementary link for `markdown` content. Null when not set.
        external_identifier:
          type: [string, 'null']
          description: Namespaced platform ID for `external_ref` content. Null for other types.
        resource_url:
          type: [string, 'null']
          description: Canonical URL of this content on its origin site. Used by the x402 verify-origin endpoint.

    ContentWithAccessResponse:
      description: >
        Full content detail plus real-time access and wallet context for a specific user.
        Returned by the buyer-facing `GET /v1/content/:id/with-access` endpoint.


        **URI gating for `external_ref` content:** `content_uri` (the external URI) is
        only present in the response when `access_info.has_purchased` is `true`. For all
        other states (unauthenticated, insufficient funds, not yet purchased) it is omitted,
        ensuring buyers cannot access the Vimeo link, PDF URI, or other external resource
        without completing a purchase.
      allOf:
        - $ref: '#/components/schemas/ContentResponse'
        - type: object
          required: [access_info]
          properties:
            access_info:
              $ref: '#/components/schemas/ContentAccessInfo'

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [buyer, seller]

    PurchaseStatus:
      type: string
      enum: [completed, refunded, pending, reverted, failed]

    PurchaseResponse:
      type: object
      required:
        [
          id,
          content_id,
          content,
          buyer_id,
          buyer,
          seller_id,
          seller,
          amount_cents,
          timestamp,
          status,
        ]
      properties:
        id:
          type: string
        content_id:
          type: string
        content:
          type: object
          required: [id, content_type, title]
          properties:
            id:
              type: string
            content_type:
              type: string
            title:
              type: string
        buyer_id:
          type: string
        buyer:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        seller_id:
          type: string
        seller:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        amount_cents:
          type: integer
        timestamp:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/PurchaseStatus'

    MerchantSaleResponse:
      type: object
      required:
        [
          id,
          content_id,
          content,
          buyer_id,
          buyer,
          seller_id,
          seller,
          amount_cents,
          fees,
          status,
          timestamp,
        ]
      properties:
        id:
          type: string
        content_id:
          type: string
        content:
          type: object
          required: [id, content_type, title]
          properties:
            id:
              type: string
            content_type:
              type: string
            title:
              type: string
        buyer_id:
          type: string
        buyer:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        seller_id:
          type: string
        seller:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        amount_cents:
          type: integer
        fees:
          type: object
          required: [platform_fee_cents, store_net_cents, author_net_cents]
          description: Platform fee split. Values are 0 (not null) on non-completed purchases.
          properties:
            platform_fee_cents:
              type: integer
            store_net_cents:
              type: integer
            author_net_cents:
              type: integer
              description: 0 for content without an author
        status:
          $ref: '#/components/schemas/PurchaseStatus'
        timestamp:
          type: string
          format: date-time

    MonthlyData:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            cents:
              type: integer
            currency_iso:
              type: string

    InviteInfoResponse:
      type: object
      required: [invited_email, store_name, role, expires_at]
      properties:
        invited_email:
          type: string
        store_name:
          type: string
        role:
          type: [string, 'null']
          enum: [owner, null]
        expires_at:
          type: string
          format: date-time

    CheckoutStateResponse:
      type: object
      required: [content_id, content_title, price_cents, checkout_state]
      properties:
        content_id:
          type: string
        content_title:
          type: string
        price_cents:
          type: integer
        checkout_state:
          type: object
          required: [is_authenticated, has_purchased, next_required_action]
          properties:
            is_authenticated:
              type: boolean
            has_sufficient_funds:
              type: [boolean, 'null']
            has_purchased:
              type: boolean
            next_required_action:
              type: string
              enum: [authenticate, fund_wallet, purchase, view_content]

    WalletPaymentStatusResponse:
      type: object
      required: [status, updated_at, balance_cents]
      properties:
        status:
          type: string
          enum: [pending, completed, failed]
        updated_at:
          type: string
          format: date-time
        balance_cents:
          type: integer

    SalesSummaryResponse:
      type: object
      required: [total_revenue_cents, total_sales, monthly_revenue_cents, monthly_sales]
      properties:
        total_revenue_cents:
          type: integer
          description: Amount in cents
        total_sales:
          type: integer
          description: Total number of sales
        monthly_revenue_cents:
          type: object
          description: Monthly revenue data grouped by year and month. First level key is year (string), second level key is month number (string, 1-12)
          additionalProperties:
            type: object
            description: Monthly data for a specific year
            additionalProperties:
              type: integer
              description: Revenue data for a specific month
        monthly_sales:
          type: object
          description: Monthly sales count data grouped by year and month. First level key is year (string), second level key is month number (string, 1-12)
          additionalProperties:
            type: object
            description: Monthly data for a specific year
            additionalProperties:
              type: integer
              description: Number of sales for a specific month

    X402ContentResponse:
      type: object
      description: >
        Response body returned by the x402 content endpoint on a successful `200`.
        Delivers the purchased content directly in the settlement response.
        `content_body` is present when `content_type` is `markdown`;
        `content_uri` is present when `content_type` is `external_ref`.
        `purchase_id` is the UUID of the settled Purchase record (null for free content).
      required: [id, content_type, title, price_cents, teaser, visibility]
      properties:
        id:
          type: string
        content_type:
          type: string
          enum: [markdown, external_ref]
        title:
          type: string
        price_cents:
          type: integer
        teaser:
          type: string
          format: byte
        visibility:
          type: string
          enum: [public, unlisted, private]
        metadata:
          type: object
          additionalProperties: true
        external_identifier:
          type: [string, 'null']
        purchase_id:
          type: [string, 'null']
          description: UUID of the settled Purchase record. Null for free content.
        resource_url:
          type: [string, 'null']
          description: Canonical URL of this content on its origin site. Set when content was registered via a pricing rule or manual resource_url assignment.
        content_body:
          type: [string, 'null']
          format: byte
          description: Full article body in markdown. Present when content_type is markdown.
        content_uri:
          type: [string, 'null']
          description: URI of the external resource. Present when content_type is external_ref.

    VerifyOriginVerified:
      type: object
      description: Returned when the URL matches a registered Ledewire content item.
      required: [verified, content_id, store_id, amount, title]
      properties:
        verified:
          type: boolean
          enum: [true]
        content_id:
          type: string
          description: UUID of the matching Content record.
        store_id:
          type: string
          description: UUID of the store that owns this content.
        amount:
          type: string
          description: Price in cents as a string (e.g. "10" = $0.10).
        title:
          type: string
          description: Content title.

    VerifyOriginUnverified:
      type: object
      description: Returned when the URL is not registered or the URL is invalid.
      required: [verified]
      properties:
        verified:
          type: boolean
          enum: [false]

    JwksResponse:
      type: object
      description: JSON Web Key Set (RFC 7517) containing the RS256 public key for x402 accessToken verification.
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            required: [kty, use, alg, kid, n, e]
            properties:
              kty:
                type: string
                enum: [RSA]
              use:
                type: string
                enum: [sig]
              alg:
                type: string
                enum: [RS256]
              kid:
                type: string
                description: Key ID. Matches the `kid` header claim in minted access tokens.
              n:
                type: string
                description: RSA modulus (Base64url-encoded).
              e:
                type: string
                description: RSA public exponent (Base64url-encoded).

    SettlementResponse:
      type: object
      description: >
        x402 v2 settlement result. Base64-encoded JSON returned in the `PAYMENT-RESPONSE` header
        on a successful `200`. `accessToken` is present when an RS256 signing key is configured;
        omitted in environments without credentials.
      required: [success, transaction, network, payer]
      properties:
        success:
          type: boolean
          enum: [true]
        transaction:
          type: string
          description: UUID of the settled Purchase record.
        network:
          type: string
          enum: ['ledewire:v1']
        payer:
          type: string
          description: UUID of the buying user.
        accessToken:
          type: [string, 'null']
          description: Short-lived RS256-signed JWT for offline entitlement verification. Verifiable via `/.well-known/x402-jwks.json`. Omitted if signing key is not configured.

    MerchantPricingRule:
      type: object
      required: [id, store_id, url_pattern, price_cents, active, created_at, updated_at]
      properties:
        id:
          type: string
          description: UUID of the pricing rule.
        store_id:
          type: string
          description: UUID of the owning store.
        url_pattern:
          type: string
          description: Glob URL pattern (supports * and ** wildcards). Must start with http:// or https://.
        price_cents:
          type: integer
          description: Price in cents applied to content matching this pattern.
        active:
          type: boolean
          description: Whether the rule is currently active. Inactive rules are ignored during URL matching.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MerchantDomainVerification:
      type: object
      required: [id, store_id, domain, status, txt_record_name, txt_record_value, created_at]
      properties:
        id:
          type: string
          description: UUID of the domain verification record.
        store_id:
          type: string
          description: UUID of the owning store.
        domain:
          type: string
          description: The verified domain (www. prefix is stripped on creation).
        status:
          type: string
          enum: [pending, verified, failed]
          description: Verification status updated by DomainVerifyJob.
        txt_record_name:
          type: string
          description: DNS TXT record name the merchant must add (e.g. _ledewire-verify.example.com).
        txt_record_value:
          type: string
          description: DNS TXT record value the merchant must set.
        verified_at:
          type: [string, 'null']
          format: date-time
          description: Timestamp of successful verification. Null until verified.
        checked_at:
          type: [string, 'null']
          format: date-time
          description: Timestamp of the most recent verification check (success or failure).
        created_at:
          type: string
          format: date-time

security:
  - BearerAuth: []

paths:
  /v1/config/public:
    get:
      summary: Get public platform configuration
      description: >
        Returns platform-level configuration values that are safe to expose publicly.
        No authentication is required. Use this endpoint to retrieve the Google OAuth
        client ID before the user has signed in.
      tags:
        - Config
      security: []
      responses:
        '200':
          description: Public platform configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicConfigResponse'

  /v1/auth/signup:
    post:
      summary: Register a new user with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSignupRequest'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              examples:
                success:
                  summary: Successful registration
                  value:
                    access_token: 'eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIwOTM1N2MyMi0zODlhLTRmYWItYjE2Ni04MjJlNTJhNWJmNWUiLCJyb2xlIjoiYnV5ZXIiLCJidXllcl9jbGFpbXMiOnsidXNlcl9pZCI6IjA5MzU3YzIyLTM4OWEtNGZhYi1iMTY2LTgyMmU1MmE1YmY1ZSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSJ9LCJpc3MiOiJMZWRlV2lyZSBBUEkiLCJhdWQiOiJ3ZWIiLCJleHAiOjE3NDc0OTk5NzMsImlhdCI6MTc0NzQ5ODE3M30'
                    refresh_token: 'c2a0e1f8a7e53c9d63b1d2f8e4z5x6c7v8b9n0m1a2s3d4f5g6h7j8k9l0'
                    expires_at: '2025-05-17T16:39:33Z'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_error:
                  summary: Validation error
                  value:
                    error: 'Email is invalid'
                account_exists:
                  summary: Account already exists
                  value:
                    error: 'Account with this email already exists'

  /v1/auth/login/email:
    post:
      summary: Log in using email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginEmailRequest'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              examples:
                success:
                  summary: Successful login
                  value:
                    access_token: 'eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIwOTM1N2MyMi0zODlhLTRmYWItYjE2Ni04MjJlNTJhNWJmNWUiLCJyb2xlIjoiYnV5ZXIiLCJpc3MiOiJMZWRlV2lyZSBBUEkiLCJhdWQiOiJ3ZWIiLCJleHAiOjE3NDc0OTk5NzMsImlhdCI6MTc0NzQ5ODE3M30'
                    refresh_token: '45a67890cd1ef2gh3ij4kl5mn6op7qr8st9uvwxyz123456789abcdef01'
                    expires_at: '2025-05-17T16:39:33Z'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_credentials:
                  summary: Invalid credentials
                  value:
                    error: 'Invalid email or password'

  /v1/auth/login/google:
    post:
      summary: Log in using Google OAuth
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginOAuthRequest'
            examples:
              google_login:
                summary: Google OAuth login
                value:
                  id_token: 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjEyMzQ1Njc4OTAiLCJ0eXAiOiJKV1QifQ.eyJpc3MiOiJhY2NvdW50cy5nb29nbGUuY29tIiwiYXVkIjoiY2xpZW50LWlkIiwiZXhwIjoxNzQ3NDk5OTczLCJpYXQiOjE3NDc0OTgxNzMsInN1YiI6IjEyMzQ1Njc4OTAiLCJlbWFpbCI6InRlc3RAZXhhbXBsZS5jb20iLCJuYW1lIjoiVGVzdCBVc2VyIiwicGljdHVyZSI6Imh0dHBzOi8vZXhhbXBsZS5jb20vYXZhdGFyLmpwZyJ9.signature'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              examples:
                success:
                  summary: Successful Google OAuth login
                  value:
                    access_token: 'eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIwOTM1N2MyMi0zODlhLTRmYWItYjE2Ni04MjJlNTJhNWJmNWUiLCJyb2xlIjoiYnV5ZXIiLCJidXllcl9jbGFpbXMiOnsidXNlcl9pZCI6IjA5MzU3YzIyLTM4OWEtNGZhYi1iMTY2LTgyMmU1MmE1YmY1ZSIsImVtYWlsIjoidGVzdEBleGFtcGxlLmNvbSJ9LCJpc3MiOiJMZWRlV2lyZSBBUEkiLCJhdWQiOiJ3ZWIiLCJleHAiOjE3NDc0OTk5NzMsImlhdCI6MTc0NzQ5ODE3M30'
                    refresh_token: 'google_oauth_refresh_token_123'
                    expires_at: '2025-05-17T16:39:33Z'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_token:
                  summary: Missing ID token
                  value:
                    error: 'id_token is missing'
                invalid_token:
                  summary: Invalid token format
                  value:
                    error: 'id_token must be a valid JWT token'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_token:
                  summary: Invalid Google ID token
                  value:
                    error: 'Invalid or expired token'
        '503':
          description: Google service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                service_unavailable:
                  summary: Google OAuth service unavailable
                  value:
                    error: 'Unable to verify token'

  /v1/auth/login/buyer-api-key:
    post:
      summary: Exchange a buyer API key + secret for a JWT
      tags:
        - Authentication
      description: >
        Authenticate as a buyer using a named API key and secret.
        Returns the same token shape as `POST /v1/auth/login/email`.
        Rate-limited to 60 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginBuyerApiKeyRequest'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
        '401':
          description: Invalid key or secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/user/api-keys:
    get:
      summary: List buyer API keys for the authenticated user
      tags:
        - Buyer API Keys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of API keys (secret never included)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserApiKey'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new buyer API key
      tags:
        - Buyer API Keys
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserApiKeyCreateRequest'
      responses:
        '201':
          description: Key and secret (secret shown once only — store immediately)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiKeyCreateResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/user/api-keys/{id}:
    delete:
      summary: Revoke a buyer API key
      tags:
        - Buyer API Keys
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Key revoked
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/login/api-key:
    post:
      summary: Log in using API key and secret
      tags:
        - Authentication
      description: >
        Authenticate as a seller using API credentials.


        **Permission Levels:**

        - Provide only `api_key` (without `api_secret`) to receive a token with **`view` permission** (read-only access)

        - Provide both `api_key` and `api_secret` to receive a token with **`full` permission** (read/write access)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginApiKeyRequest'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              examples:
                success:
                  summary: Successful API key authentication
                  value:
                    access_token: 'eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiI4NzY1NDMyMS1kY2JhLTRmZWQtYmE5OC03NjU0MzIxMGZlZGMiLCJyb2xlIjoic2VsbGVyIiwic2VsbGVyX2NsYWltcyI6eyJzZWxsZXJfaWQiOiI4NzY1NDMyMS1kY2JhLTRmZWQtYmE5OC03NjU0MzIxMGZlZGMifSwiaXNzIjoiTGVkZVdpcmUgQVBJIiwiYXVkIjoid2ViIiwiZXhwIjoxNzQ3NTU5OTczLCJpYXQiOjE3NDc1NTgxNzN9'
